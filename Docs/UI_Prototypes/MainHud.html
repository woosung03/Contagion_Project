<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Contagion Project — Main HUD Prototype</title>
<link rel="stylesheet" href="MainHud.css" />
</head>
<body>

  <!-- ============================================================
       device-frame: 세로 화면(1440x3120, 19.5:9) 프리뷰용 래퍼.
       실제 UI Toolkit 변환 시 이 바깥 프레임은 존재하지 않는다 —
       Unity PanelSettings의 referenceResolution이 이 역할을 대신한다.
       ============================================================ -->
  <div class="device-frame">
    <div class="hud-root">

      <!-- ============================================================
           top-bar : 신규 추가 영역 (현재 Hud.uxml에는 없음).
           설정(gear) / 뉴스 토글 / 날짜 표시. UI Toolkit 변환 시
           아이콘은 텍스트 글리프가 아니라 Sprite(Image)로 교체한다.
           ============================================================ -->
      <div class="top-bar">
        <button class="icon-button" aria-label="설정">
          <span class="icon-button__glyph">⚙</span>
        </button>

        <button class="news-toggle-button">
          <span class="news-toggle-button__glyph">🗞</span>
          <span class="news-toggle-button__text">뉴스</span>
        </button>

        <div class="date-display">
          <span class="date-display__part">2026</span>
          <span class="date-display__sep">·</span>
          <span class="date-display__part">07</span>
          <span class="date-display__sep">·</span>
          <span class="date-display__part">08</span>
        </div>
      </div>

      <!-- ============================================================
           news-scroll : 기존 Hud.uxml과 동일한 이름/역할.
           ============================================================ -->
      <div class="news-scroll">
        <div class="news-entry news-entry--flavor">WHO, 원인 불명 발열 환자 급증 지역 조사 착수</div>
        <div class="news-entry news-entry--negative">한국 — 공항 검역 강화 발표</div>
      </div>

      <!-- ============================================================
           map-viewport : 기존 map-spacer 자리를 대체하는 신규 구조.
           실제 지도(WorldMap.cs + CountryView 48개)는 이 영역 안에
           렌더링되며, 아래 map-placeholder / infection-dot 은
           프로토타입 시각화 전용이다 (변환 불필요 — Unity 쪽 실제
           구현이 이미 존재).
           ============================================================ -->
      <div class="map-viewport">
        <div class="map-placeholder">
          <div class="map-placeholder__ocean"></div>

          <!-- 대륙 형태 스키매틱 블록 (실제 지리 데이터 아님, 배치 예시용) -->
          <span class="landmass landmass--eurasia"></span>
          <span class="landmass landmass--africa"></span>
          <span class="landmass landmass--namerica"></span>
          <span class="landmass landmass--samerica"></span>
          <span class="landmass landmass--australia"></span>

          <!-- 감염 점 오버레이 예시 -->
          <span class="infection-dot infection-dot--origin" style="left:52%; top:34%;"></span>
          <span class="infection-dot infection-dot--spreading" style="left:47%; top:31%;"></span>
          <span class="infection-dot infection-dot--spreading" style="left:56%; top:38%;"></span>
          <span class="infection-dot infection-dot--critical" style="left:23%; top:30%;"></span>

          <div class="map-placeholder__label">WORLD MAP<br /><span>(WorldMap.cs 렌더링 영역)</span></div>
        </div>

        <!-- 국가 선택 안내 카드 — 참조 이미지의 "Touch the country" 툴팁을
             VoltAgent 톤(다크 캔버스 + 헤어라인 보더 + 그린 단일 액센트)으로 재구성 -->
        <div class="select-hint-card">
          <button class="select-hint-card__close" aria-label="닫기">×</button>
          <div class="select-hint-card__title">병원체를 퍼뜨릴 국가를 선택하세요</div>
          <div class="select-hint-card__body">
            국가를 선택하면 국기와 시작 정보가 표시됩니다. 시작 버블을 눌러 확정하거나
            다른 국가를 다시 선택할 수 있습니다.
          </div>
        </div>
      </div>

      <!-- ============================================================
           bottom-bar : 기존 Hud.uxml과 동일한 3행 구조(stats-row /
           meta-row / tabs-row)를 그대로 유지 — 클래스명도 동일하게
           맞춰 UXML 변환 시 구조 변경 없이 스타일만 옮기면 된다.
           ============================================================ -->
      <div class="bottom-bar">

        <div class="stats-row">
          <div class="stat-graph-item">
            <span class="stat-graph-item__label stat-graph-item__label--infected">감염자: 128,402,110</span>
            <div class="stat-graph-item__graph">
              <span class="bar" style="height:20%"></span>
              <span class="bar" style="height:32%"></span>
              <span class="bar" style="height:28%"></span>
              <span class="bar" style="height:44%"></span>
              <span class="bar" style="height:58%"></span>
              <span class="bar" style="height:70%"></span>
              <span class="bar" style="height:86%"></span>
              <span class="bar" style="height:100%"></span>
            </div>
          </div>

          <div class="stat-graph-item">
            <span class="stat-graph-item__label stat-graph-item__label--dead">사망자: 4,208,553</span>
            <div class="stat-graph-item__graph">
              <span class="bar" style="height:10%"></span>
              <span class="bar" style="height:14%"></span>
              <span class="bar" style="height:18%"></span>
              <span class="bar" style="height:22%"></span>
              <span class="bar" style="height:30%"></span>
              <span class="bar" style="height:38%"></span>
              <span class="bar" style="height:46%"></span>
              <span class="bar" style="height:55%"></span>
            </div>
          </div>

          <div class="stat-graph-item">
            <span class="stat-graph-item__label stat-graph-item__label--cure">치료제: 12%</span>
            <div class="stat-graph-item__graph">
              <span class="bar" style="height:4%"></span>
              <span class="bar" style="height:5%"></span>
              <span class="bar" style="height:6%"></span>
              <span class="bar" style="height:8%"></span>
              <span class="bar" style="height:9%"></span>
              <span class="bar" style="height:10%"></span>
              <span class="bar" style="height:11%"></span>
              <span class="bar" style="height:12%"></span>
            </div>
          </div>
        </div>

        <div class="meta-row">
          <span class="stat-label stat-label--dna">DNA: 24</span>
          <span class="stat-label stat-label--day">17일차</span>
          <span class="stat-label stat-label--phase">잠복기</span>
          <span class="stat-label stat-label--mortality"></span>
        </div>

        <div class="tabs-row">
          <button class="tab-button">업그레이드</button>
          <button class="tab-button">국가현황</button>
          <button class="tab-button tab-button--secondary">랭킹</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
